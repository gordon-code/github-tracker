default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-json", priority = 0 },
  { id = "check-toml", priority = 0 },
  { id = "check-yaml", priority = 0 },
  { id = "end-of-file-fixer", priority = 0 },
  { id = "trailing-whitespace", priority = 0 },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "typecheck"
name = "TypeScript typecheck"
language = "system"
entry = "pnpm typecheck"
pass_filenames = false
always_run = true
priority = 0

[[repos.hooks]]
id = "test"
name = "Vitest tests"
language = "system"
entry = "pnpm test"
pass_filenames = false
always_run = true
priority = 0

[[repos.hooks]]
id = "csp-hash"
name = "CSP hash verification"
language = "system"
entry = "node scripts/verify-csp-hash.mjs"
pass_filenames = false
always_run = true
priority = 0

[[repos.hooks]]
id = "waf"
name = "WAF smoke tests"
language = "system"
entry = "pnpm test:waf"
pass_filenames = false
always_run = true
priority = 0

[[repos.hooks]]
id = "e2e"
name = "Playwright E2E tests"
language = "system"
entry = "pnpm test:e2e"
pass_filenames = false
always_run = true
stages = ["pre-push"]
priority = 0
