name = "github-tracker"
main = "src/worker/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["global_fetch_strictly_public", "nodejs_als"]
workers_dev = false

[assets]
# The Cloudflare Vite plugin overrides this directory at build time.
# The `public/` value is needed for wrangler dev and vitest-pool-workers (which parse wrangler.toml directly).
directory = "public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[routes]]
pattern = "gh.gordoncode.dev"
custom_domain = true

[vars]
# SENTRY_DSN is used by both the Sentry tunnel endpoint (DSN validation) and the
# @sentry/cloudflare SDK for worker-side error capture. No additional secrets needed.
SENTRY_DSN = "https://4dc4335a9746201c02ff2107c0d20f73@o284235.ingest.us.sentry.io/4511122822922240"

[[ratelimits]]
name = "PROXY_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 60
period = 60

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
