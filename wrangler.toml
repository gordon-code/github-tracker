name = "github-tracker"
main = "src/worker/index.ts"
compatibility_date = "2026-03-01"
workers_dev = false

[assets]
# The Cloudflare Vite plugin overrides this directory at build time.
# The `public/` value is needed for wrangler dev and vitest-pool-workers (which parse wrangler.toml directly).
directory = "public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[routes]]
pattern = "gh.gordoncode.dev"
custom_domain = true

# Sentry tunnel — DSN is a public identifier, not a secret.
# Set after creating a Sentry project.
# Example: SENTRY_DSN = "https://key@o123456.ingest.sentry.io/7890123"
[vars]
SENTRY_DSN = "https://4dc4335a9746201c02ff2107c0d20f73@o284235.ingest.us.sentry.io/4511122822922240"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
