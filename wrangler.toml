name = "github-tracker"
main = "src/worker/index.ts"
compatibility_date = "2026-03-01"
workers_dev = false

[assets]
# The Cloudflare Vite plugin overrides this directory at build time.
# The `public/` value is needed for wrangler dev and vitest-pool-workers (which parse wrangler.toml directly).
directory = "public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[routes]]
pattern = "gh.gordoncode.dev"
custom_domain = true

# Sentry tunnel — public identifiers, not secrets.
# Set SENTRY_HOST and SENTRY_PROJECT_ID after creating a Sentry project.
# Example: SENTRY_HOST = "o123456.ingest.sentry.io"
#          SENTRY_PROJECT_ID = "7890123"
[vars]
SENTRY_HOST = ""
SENTRY_PROJECT_ID = ""

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
